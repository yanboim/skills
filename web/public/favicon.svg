<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    :root { --bg: #000000; --text: #ffffff; }
    @media (prefers-color-scheme: dark) { :root { --bg: #ffffff; --text: #000000; } }
    .bg { fill: var(--bg); }
    .letter { fill: var(--text); font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 800; font-size: 20px; }
  </style>
  <rect class="bg" width="32" height="32" rx="7" />
  <text x="50%" y="51%" text-anchor="middle" dominant-baseline="central" class="letter">Y</text>
</svg>
